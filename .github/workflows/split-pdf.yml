name: Fetch and Split PDF

on:
  workflow_dispatch:
    inputs:
      pdf_url:
        description: 'URL of the PDF to fetch and split'
        required: true
        type: string
      drive_folder_id:
        description: 'Google Drive folder ID to upload results to'
        required: true
        type: string
      base_name:
        description: 'Base filename for the output PDFs'
        required: true
        type: string

jobs:
  split:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pypdf google-auth google-api-python-client

      - name: Fetch, split, and upload to Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python split_and_upload.py "${{ github.event.inputs.pdf_url }}" "${{ github.event.inputs.drive_folder_id }}" "${{ github.event.inputs.base_name }}"
