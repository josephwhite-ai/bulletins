name: Extract Bulletin to Google Sheet

on:
  schedule:
    - cron: '0 9 * * 0'  # Every Sunday at 9am UTC
  workflow_dispatch:       # Also allows manual runs

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pypdf gspread google-auth

      - name: Run extraction script
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ vars.SHEET_ID }}  # Store sheet ID as a repo variable (not secret)
        run: python extract_bulletin.py
